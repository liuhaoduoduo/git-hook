# Git 分支保护配置文件
#
# 格式：纯分支列表（以下列出的分支被全面保护）
#
# 全面保护包括：
#   - 禁止推送（git push origin <branch>）
#   - 禁止删除（git push origin --delete <branch>）
#   - 禁止其他分支 merge（仅允许 git pull origin <branch> 自身更新）
#   - 禁止其他分支 rebase（仅允许 git rebase origin/<branch> 自身更新）
#
# 注意：
#   - 以 # 开头的行为注释
#   - 空行被忽略
#   - 每行一个分支名（精确匹配）
#   - 配置为空（仅注释）时：保护所有分支

main
master
develop
release
hotfix
