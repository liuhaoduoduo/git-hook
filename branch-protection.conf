# Git 分支保护配置文件
#
# 格式说明：
#   [push-forbidden]    - 禁止推送的分支（段落为空时拒绝所有推送）
#   [delete-protected]  - 禁止删除的分支（段落为空时保护所有分支）
#   [merge-protected]   - 禁止其他分支 merge 的分支（段落为空时保护所有分支）
#
# 注意：
#   - 以 # 开头的行为注释
#   - 每行一个分支名（精确匹配）
#   - 段落可以为空（触发默认保护策略）
#   - 支持 [push-forbidden]、[delete-protected] 和 [merge-protected] 三个段落
#   - 未知段落会被忽略并发出警告
#
# [merge-protected] 说明：
#   - 列表中的分支禁止其他分支 merge 进来，但允许 git pull origin <branch-name> 自身更新
#   - 为空时：保护所有分支，所有分支间都禁止 merge。仅允许 git pull 更新

# ===== 禁止推送的分支 =====
# 如果此段落为空或不存在，则拒绝所有推送操作
[push-forbidden]
main
master
develop
release

# ===== 禁止删除的分支 =====
# 如果此段落为空或不存在，则保护所有分支，禁止任何删除操作
[delete-protected]
main
master
develop
release
hotfix

# ===== 禁止其他分支 merge 的分支 =====
# 列表中的分支禁止其他分支 merge 进来，但允许 git pull origin <branch-name> 自身更新
# 如果此段落为空或不存在，则保护所有分支，禁止任何分支间的 merge 操作
[merge-protected]
main
master
develop
