# Git 分支保护配置文件
#
# 格式说明：
#   [push-forbidden]   - 禁止推送的分支（段落为空时拒绝所有推送）
#   [delete-protected] - 禁止删除的分支（段落为空时保护所有分支）
#
# 注意：
#   - 以 # 开头的行为注释
#   - 每行一个分支名（精确匹配）
#   - 段落可以为空（触发默认保护策略）
#   - 仅支持 [push-forbidden] 和 [delete-protected] 两个段落
#   - 未知段落会被忽略并发出警告

# ===== 禁止推送的分支 =====
# 如果此段落为空或不存在，则拒绝所有推送操作
[push-forbidden]
main
master
develop
release

# ===== 禁止删除的分支 =====
# 如果此段落为空或不存在，则保护所有分支，禁止任何删除操作
[delete-protected]
main
master
develop
release
hotfix
